<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>벅구와 복덩어리</title>
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="favicon-32.png" sizes="32x32">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="벅구와 복덩어리">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

  :root{
    --cream:#FFF6EC;
    --pink:#FF8FA8;
    --pink-soft:#FFE3EA;
    --yellow:#FFC94C;
    --yellow-soft:#FFF3D6;
    --plum:#4A3548;
    --plum-soft:#8A7A86;
    --sage:#8FBF9F;
    --white:#FFFFFF;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    background:var(--cream);
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
    color:var(--plum);
  }

  .app-shell{
    max-width:430px;
    margin:0 auto;
    min-height:100vh;
    background:var(--cream);
    position:relative;
    padding-bottom:88px;
  }

  .app-header{
    position:sticky;
    top:0;
    z-index:20;
    background:var(--cream);
    padding:18px 20px 12px;
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
    border-bottom:1px solid rgba(74,53,72,0.08);
  }
  .app-title-row{ display:flex; align-items:center; gap:6px; }
  .home-btn{
    background:var(--white); border:none; border-radius:50%; width:26px; height:26px;
    font-size:13px; display:flex; align-items:center; justify-content:center; cursor:pointer;
    box-shadow:0 2px 6px rgba(74,53,72,0.08); flex-shrink:0; padding:0;
  }
  .app-title{
    font-family:'Jua',sans-serif;
    font-size:19px;
    letter-spacing:-0.3px;
    line-height:1.3;
  }
  .dday-pill{
    display:inline-flex;
    align-items:center;
    gap:5px;
    margin-top:6px;
    background:var(--white);
    border-radius:20px;
    padding:5px 12px;
    font-size:11px;
    color:var(--plum-soft);
    box-shadow:0 2px 8px rgba(74,53,72,0.06);
  }
  .dday-pill b{
    font-family:'Jua',sans-serif;
    color:var(--pink);
    font-size:12px;
  }
  .identity-chip{
    font-family:'Jua',sans-serif;
    font-size:13px;
    background:var(--white);
    border:none;
    padding:8px 14px;
    border-radius:20px;
    box-shadow:0 2px 8px rgba(74,53,72,0.08);
    cursor:pointer;
    color:var(--plum);
    white-space:nowrap;
    flex-shrink:0;
  }

  main{padding:16px 20px 20px;}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;animation:fadeIn .25s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  .home-today{ text-align:center; font-size:12px; color:var(--plum-soft); padding-top:8px; }
  .home-hero{
    display:flex; flex-direction:column; align-items:center; text-align:center;
    padding:8px 0 20px;
  }
  .home-mascot{ width:180px; height:180px; object-fit:contain; margin-bottom:14px; }
  .home-dday-card{
    background:var(--white); border-radius:20px; padding:16px 28px;
    box-shadow:0 4px 14px rgba(74,53,72,0.08);
  }
  .home-dday-label{ font-size:11px; color:var(--plum-soft); }
  .home-dday-num{ font-family:'Jua',sans-serif; font-size:32px; color:var(--pink); margin:2px 0; }
  .home-mini-row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
  .home-mini-card{
    background:var(--white); border-radius:16px; padding:14px; text-align:center;
    box-shadow:0 3px 10px rgba(74,53,72,0.05);
  }
  .home-mini-label{ font-size:10.5px; color:var(--plum-soft); margin-bottom:4px; }
  .home-mini-dday{ font-family:'Jua',sans-serif; font-size:18px; color:var(--pink); }
  .home-mini-sub{ font-size:10.5px; color:var(--plum-soft); margin-top:2px; word-break:break-word; }
  .home-next-card{
    background:var(--white); border-radius:18px; padding:16px; margin-bottom:14px;
    box-shadow:0 4px 14px rgba(74,53,72,0.06);
  }
  .home-next-label{ font-size:11px; color:var(--plum-soft); margin-bottom:6px; }
  .home-next-title{ font-family:'Jua',sans-serif; font-size:15px; }
  .home-next-sub{ font-size:12px; color:var(--plum-soft); margin-top:2px; }
  .home-throwback-card{
    background:linear-gradient(135deg, var(--pink-soft), var(--yellow-soft));
    border-radius:18px; padding:16px; margin-bottom:14px; cursor:pointer;
    display:flex; gap:12px; align-items:center;
  }
  .home-throwback-photo{ width:56px; height:56px; border-radius:12px; object-fit:cover; flex-shrink:0; }
  .home-throwback-label{ font-size:11px; color:#8A5A6A; margin-bottom:3px; }
  .home-throwback-title{ font-family:'Jua',sans-serif; font-size:14px; color:var(--plum); }
  .home-stats-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
  .home-stat-tile{
    background:var(--white); border-radius:16px; padding:14px; text-align:center;
    box-shadow:0 3px 10px rgba(74,53,72,0.05);
  }
  .home-stat-num{ font-family:'Jua',sans-serif; font-size:20px; }
  .home-stat-label{ font-size:10.5px; color:var(--plum-soft); margin-top:2px; }

  .section-title{
    font-family:'Jua',sans-serif;
    font-size:18px;
    margin:4px 0 14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .section-sub{
    font-size:12px;
    font-weight:400;
    color:var(--plum-soft);
    font-family:'Pretendard',sans-serif;
  }

  .add-card{
    background:var(--white);
    border-radius:18px;
    padding:16px;
    margin-bottom:18px;
    box-shadow:0 4px 14px rgba(74,53,72,0.06);
  }
  .add-row{display:flex;gap:8px;margin-bottom:8px;}
  .add-row:last-child{margin-bottom:0;}
  input[type="text"], input[type="date"], input[type="time"], input[type="url"], textarea{
    width:100%;
    border:1.5px solid #F0E4E9;
    background:#FDFBF9;
    border-radius:12px;
    padding:10px 12px;
    font-size:14px;
    font-family:'Pretendard',sans-serif;
    color:var(--plum);
    outline:none;
  }
  input[type="date"], input[type="time"] {
    -webkit-appearance: none;
    appearance: none;
    height: 42px;
  }
  input[type="text"]:focus, input[type="date"]:focus, input[type="time"]:focus, input[type="url"]:focus, textarea:focus{
    border-color:var(--pink);
  }
  textarea{resize:none;min-height:56px;}
  .btn{
    font-family:'Jua',sans-serif;
    border:none;
    border-radius:12px;
    padding:10px 16px;
    font-size:14px;
    cursor:pointer;
    color:var(--white);
    background:var(--pink);
    white-space:nowrap;
  }
  .btn:active{transform:scale(0.96);}
  .btn-yellow{background:var(--yellow);color:var(--plum);}
  .btn:disabled{opacity:0.55;cursor:default;}

  .btn-photo{
    background:#FDFBF9;border:1.5px dashed #E7D4DB;border-radius:12px;
    padding:9px 12px;font-size:12.5px;color:var(--plum-soft);cursor:pointer;
    font-family:'Pretendard',sans-serif;width:100%;
  }
  .photo-preview-grid{
    display:flex; flex-wrap:wrap; gap:8px; margin-top:8px;
  }
  .photo-thumb{ position:relative; width:84px; height:84px; }
  .photo-thumb img{ width:100%; height:100%; object-fit:cover; border-radius:10px; display:block; background:#F5EBEE; }
  .rm-photo-thumb{
    position:absolute; top:-6px; right:-6px; background:var(--white); border:none;
    border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center;
    font-size:11px; cursor:pointer; color:var(--plum); box-shadow:0 1px 4px rgba(74,53,72,0.2);
  }
  .card-photos{
    display:flex; gap:8px; overflow-x:auto; -webkit-overflow-scrolling:touch;
    margin-top:8px; padding-bottom:2px;
  }
  .card-photos img{
    width:140px; height:140px; object-fit:cover; border-radius:12px; flex-shrink:0; background:#F5EBEE;
    cursor:pointer;
  }
  .card-photos img:active{ opacity:0.85; }

  .lightbox{
    position:fixed; inset:0; background:rgba(20,14,18,0.94); z-index:300;
    display:flex; align-items:center; justify-content:center;
  }
  .lightbox-close{
    position:absolute; top:calc(16px + env(safe-area-inset-top)); right:16px; z-index:310;
    background:rgba(255,255,255,0.18); border:none; color:#fff; width:38px; height:38px;
    border-radius:50%; font-size:18px; display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .lightbox-hint{
    position:absolute; bottom:calc(20px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%);
    color:rgba(255,255,255,0.65); font-size:11px; z-index:310;
  }
  .lightbox-nav{
    position:absolute; top:50%; transform:translateY(-50%); z-index:310;
    background:rgba(255,255,255,0.16); border:none; color:#fff; width:40px; height:40px;
    border-radius:50%; font-size:22px; display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .lightbox-prev{ left:10px; }
  .lightbox-next{ right:10px; }
  .lightbox-counter{
    position:absolute; top:calc(16px + env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
    color:#fff; font-size:12px; background:rgba(255,255,255,0.16); padding:4px 12px; border-radius:12px; z-index:310;
  }
  .lightbox-stage{
    width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    overflow:hidden; touch-action:none;
  }
  .lightbox-stage img{
    max-width:100%; max-height:100%; object-fit:contain;
    transform-origin:center center; user-select:none; -webkit-user-drag:none;
  }
  .field-group{ display:flex; flex-direction:column; gap:4px; min-width:0; overflow:hidden; }
  .field-label{ font-size:10px; color:var(--plum-soft); padding-left:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .datetime-row{
    display:flex; gap:6px; margin-bottom:8px;
    overflow:hidden; width:100%;
  }
  .datetime-row .field-group.date-field{ flex: 1 1 0%; min-width: 0; }
  .datetime-row .field-group.time-field{ flex: 0 0 115px; min-width: 0; max-width: 115px; }
  .datetime-row input{ width:100%; min-width:0; }
  .link-toggle-btn{
    display:block; background:none; border:none; color:var(--pink); font-size:12px;
    text-align:left; padding:2px 2px 10px; cursor:pointer; font-weight:700; font-family:'Pretendard',sans-serif;
  }
  .date-plan-toggle{
    display:block; width:100%; text-align:center; padding:9px 0; border-radius:12px;
    border:1.5px solid #F0E4E9; background:#FDFBF9; color:var(--plum-soft); font-size:12.5px;
    cursor:pointer; font-family:'Pretendard',sans-serif; margin-bottom:8px;
  }
  .date-plan-toggle.active{ background:var(--pink); color:var(--white); border-color:var(--pink); font-weight:700; }

  .list{display:flex;flex-direction:column;gap:10px;}
  .item-card{
    background:var(--white);
    border-radius:16px;
    padding:14px;
    display:flex;
    align-items:flex-start;
    gap:12px;
    box-shadow:0 3px 10px rgba(74,53,72,0.05);
  }
  .date-badge{
    flex-shrink:0;
    width:44px;
    text-align:center;
    background:var(--pink-soft);
    border-radius:10px;
    padding:6px 0;
    font-family:'Jua',sans-serif;
  }
  .date-badge .day{font-size:16px;line-height:1;}
  .date-badge .mon{font-size:10px;color:var(--plum-soft);}
  .item-body{flex:1;min-width:0;}
  .item-title{font-size:14px;font-weight:600;word-break:break-word;}
  .item-memo{font-size:12px;color:var(--plum-soft);margin-top:3px;word-break:break-word;white-space:pre-wrap;}
  .item-meta{display:flex;align-items:center;gap:6px;margin-top:6px;}
  .author-tag{
    font-size:10px;
    padding:2px 8px;
    border-radius:8px;
    font-family:'Jua',sans-serif;
  }
  .author-sojeong{background:var(--pink-soft);color:#C24065;}
  .author-seonho{background:var(--yellow-soft);color:#8A6600;}
  .del-btn{
    border:none;background:none;color:#D8C7CE;font-size:16px;cursor:pointer;padding:2px 4px;flex-shrink:0;
  }
  .edit-btn{
    border:none;background:none;color:var(--plum-soft);font-size:15px;cursor:pointer;padding:2px 6px;flex-shrink:0;
  }
  .cancel-edit-btn{
    display:block;width:100%;text-align:center;background:none;border:none;
    color:var(--plum-soft);font-size:12px;padding:10px 0 0;cursor:pointer;text-decoration:underline;
  }
  .toggle-past-btn{
    display:block;margin:14px auto 0;background:var(--white);border:none;border-radius:20px;
    padding:8px 16px;font-size:12px;color:var(--plum-soft);box-shadow:0 2px 8px rgba(74,53,72,0.06);cursor:pointer;
  }
  .past{opacity:0.5;}

  .group-toggle{
    display:flex; align-items:center; justify-content:space-between; width:100%;
    background:var(--white); border:none; border-radius:14px; padding:12px 16px;
    font-family:'Jua',sans-serif; font-size:13px; color:var(--plum); cursor:pointer;
    box-shadow:0 3px 10px rgba(74,53,72,0.05); margin-bottom:10px;
  }
  .group-toggle .group-count{ font-family:'Pretendard',sans-serif; font-size:11px; color:var(--plum-soft); font-weight:400; }
  .group-content{ display:flex; flex-direction:column; gap:10px; margin-bottom:10px; }
  .group-content.wish-group{ gap:0; }

  .filter-notice{
    display:flex; align-items:center; justify-content:space-between;
    background:var(--pink-soft); border-radius:12px; padding:10px 14px; margin-bottom:12px;
    font-size:12px; color:#C24065;
  }
  .filter-notice button{
    background:none; border:none; color:#C24065; font-weight:700; font-size:12px; cursor:pointer; text-decoration:underline;
  }

  .calendar-card{
    background:var(--white); border-radius:18px; padding:16px; margin-bottom:18px;
    box-shadow:0 4px 14px rgba(74,53,72,0.06);
  }
  .calendar-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .calendar-month-label{ font-family:'Jua',sans-serif; font-size:15px; }
  .calendar-nav-btn{ background:none; border:none; font-size:18px; color:var(--plum-soft); cursor:pointer; padding:2px 12px; }
  .calendar-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:3px; text-align:center; }
  .calendar-weekday{ font-size:10px; color:var(--plum-soft); padding-bottom:6px; }
  .calendar-day{
    position:relative; min-height:50px; display:flex; flex-direction:column; align-items:center;
    padding:3px 1px 2px; border-radius:8px; cursor:pointer; color:var(--plum); overflow:hidden;
  }
  .calendar-day.empty{ cursor:default; }
  .cal-daynum{ font-size:11px; line-height:1.2; }
  .calendar-day.today .cal-daynum{ font-weight:700; color:var(--pink); }
  .calendar-day.selected{ background:var(--pink-soft); }
  .cal-events{ display:flex; flex-direction:column; gap:1px; width:100%; margin-top:1px; }
  .cal-event-pill{
    font-size:7px; line-height:1.5; padding:0 2px; border-radius:3px; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; width:100%; color:#4A3548; font-weight:600; text-align:left;
  }
  .cal-event-pill.empty-label{ text-indent:-999px; }
  .cal-event-pill.person-sojeong{ background:var(--pink-soft); }
  .cal-event-pill.person-seonho{ background:var(--yellow-soft); }
  .cal-event-more{ font-size:7px; color:var(--plum-soft); margin-top:1px; }

  .empty-state{
    text-align:center;
    padding:40px 10px;
    color:var(--plum-soft);
    font-size:13px;
  }
  .empty-emoji{font-size:32px;display:block;margin-bottom:10px;}

  .wish-card{
    background:var(--white);border-radius:18px;overflow:hidden;
    box-shadow:0 4px 14px rgba(74,53,72,0.06);margin-bottom:14px;
  }
  .wish-photo{width:100%;height:170px;object-fit:cover;display:block;background:#F5EBEE;}
  .wish-content{padding:16px;}
  .wish-title{font-size:15px;font-weight:700;margin-bottom:6px;}
  .wish-body{font-size:13px;color:var(--plum-soft);white-space:pre-wrap;word-break:break-word;line-height:1.5;}
  .wish-link{
    display:inline-flex;align-items:center;gap:4px;margin-top:10px;font-size:12px;
    background:var(--pink-soft);color:#C24065;padding:6px 10px;border-radius:10px;text-decoration:none;
    word-break:break-all;
  }
  .wish-footer{
    display:flex;align-items:center;justify-content:space-between;margin-top:12px;
    padding-top:10px;border-top:1px solid #F5EBEE;
  }
  .wish-meta{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--plum-soft);}
  .wish-card.wish-done{opacity:0.55;}
  .wish-card.wish-done .wish-title{text-decoration:line-through;}
  .wish-check{
    background:none;border:1.5px solid #F0E4E9;border-radius:10px;padding:5px 10px;
    font-size:11px;color:var(--plum-soft);cursor:pointer;font-family:'Pretendard',sans-serif;
  }
  .wish-check.checked{background:var(--sage);border-color:var(--sage);color:var(--white);}
  .letter-to{
    display:inline-flex;align-items:center;gap:4px;font-family:'Jua',sans-serif;font-size:13px;
    padding:5px 12px;border-radius:10px;margin-bottom:8px;
  }
  .letter-to.to-sojeong{background:var(--pink-soft);color:#C24065;}
  .letter-to.to-seonho{background:var(--yellow-soft);color:#8A6600;}
  .letter-from{font-family:'Jua',sans-serif;font-size:11px;padding:3px 9px;border-radius:8px;}
  .letter-from.from-sojeong{background:var(--pink-soft);color:#C24065;}
  .letter-from.from-seonho{background:var(--yellow-soft);color:#8A6600;}

  .stat-row{display:flex;gap:10px;margin-bottom:16px;}
  .stat-card{
    flex:1;background:var(--white);border-radius:16px;padding:14px;text-align:center;
    box-shadow:0 3px 10px rgba(74,53,72,0.05);
  }
  .stat-num{font-family:'Jua',sans-serif;font-size:22px;}
  .stat-label{font-size:11px;color:var(--plum-soft);margin-top:2px;}
  .person-toggle{display:flex;gap:8px;margin-bottom:10px;}
  .person-btn{
    flex:1;padding:10px;border-radius:12px;border:1.5px solid #F0E4E9;background:#FDFBF9;
    font-family:'Jua',sans-serif;font-size:13px;cursor:pointer;color:var(--plum-soft);
  }
  .person-btn.selected-sojeong{background:var(--pink);color:var(--white);border-color:var(--pink);}
  .person-btn.selected-seonho{background:var(--yellow);color:var(--plum);border-color:var(--yellow);}

  .stamp-list{display:flex;flex-direction:column;gap:12px;}
  .stamp-card{
    background:var(--white);border-radius:16px;padding:14px;display:flex;gap:12px;align-items:flex-start;
    box-shadow:0 3px 10px rgba(74,53,72,0.05);
  }
  .stamp-badge{
    flex-shrink:0;width:56px;height:56px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;position:relative;
    transform:rotate(-8deg);font-family:'Jua',sans-serif;font-size:9px;text-align:center;line-height:1.15;
  }
  .stamp-badge::before{
    content:'';position:absolute;inset:0;border-radius:50%;border:2.5px dashed currentColor;
  }
  .stamp-badge.p-sojeong{color:#C24065;}
  .stamp-badge.p-seonho{color:#8A6600;}
  .stamp-badge-img{
    flex-shrink:0;width:56px;height:56px;object-fit:contain;
  }
  .stamp-pop{animation:stampPop .45s cubic-bezier(.34,1.56,.64,1);}
  @keyframes stampPop{0%{transform:scale(0) rotate(-30deg);opacity:0;}70%{transform:scale(1.15) rotate(-8deg);opacity:1;}100%{transform:scale(1) rotate(-8deg);}}
  .stamp-body{flex:1;min-width:0;}
  .stamp-text{font-size:13.5px;word-break:break-word;white-space:pre-wrap;}
  .stamp-date{font-size:11px;color:var(--plum-soft);margin-top:3px;}

  .tabbar{
    position:fixed;
    bottom:max(14px, calc(env(safe-area-inset-bottom) + 8px));
    left:50%;transform:translateX(-50%);
    width:calc(100% - 32px);max-width:398px;
    background:var(--white);
    display:flex;
    box-shadow:0 6px 20px rgba(74,53,72,0.16);
    border-radius:24px;
    padding:9px 4px;
    z-index:30;
  }
  .tab-btn{

  async function geocodeLocation(query){
    if(!query) return null;
    try{
      const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(query)}`);
      const data = await res.json();
      if(data && data[0]){
        return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
      }
    }catch(e){ console.error('지오코딩 실패', e); }
    return null;
  }

  function resizeImage(file){
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onload = (e)=>{
        const img = new Image();
        img.onload = ()=>{
          let w = img.width, h = img.height;
          const maxDim = 1000;
          if(w > maxDim || h > maxDim){
            if(w > h){ h = Math.round(h * maxDim / w); w = maxDim; }
            else { w = Math.round(w * maxDim / h); h = maxDim; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', 0.65));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function renderPhotoPreviewGrid(wrapId, getPhotos, setPhotos){
    const wrap = document.getElementById(wrapId);
    const photos = getPhotos();
    if(!photos || photos.length === 0){
      wrap.innerHTML = '';
      wrap.classList.add('hidden');
      return;
    }
    wrap.classList.remove('hidden');
    wrap.innerHTML = photos.map((p,i)=>`
      <div class="photo-thumb">
        <img src="${p}">
        <button type="button" class="rm-photo-thumb" data-idx="${i}">✕</button>
      </div>
    `).join('');
    wrap.querySelectorAll('.rm-photo-thumb').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const idx = Number(btn.dataset.idx);
        const updated = getPhotos().slice();
        updated.splice(idx, 1);
        setPhotos(updated);
        renderPhotoPreviewGrid(wrapId, getPhotos, setPhotos);
      });
    });
  }
  function setupPhotoPicker(inputId, btnId, wrapId, getPhotos, setPhotos){
    const input = document.getElementById(inputId);
    document.getElementById(btnId).addEventListener('click', ()=> input.click());
    input.addEventListener('change', async ()=>{
      if(!input.files || !input.files.length) return;
      try{
        const files = Array.from(input.files);
        const newPhotos = await Promise.all(files.map(f=>resizeImage(f)));
        setPhotos(getPhotos().concat(newPhotos));
        renderPhotoPreviewGrid(wrapId, getPhotos, setPhotos);
      }catch(e){ console.error('사진 처리 실패', e); }
      input.value = '';
    });
  }

  function localDateStr(d){
    d = d || new Date();
    const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  }
  function fmtDate(d){
    if(!d) return {day:'-', mon:''};
    const dt = new Date(d + 'T00:00:00');
    return { day: dt.getDate(), mon: (dt.getMonth()+1) + '월' };
  }
  function fmtShortDate(d){
    if(!d) return '';
    const dt = new Date(d + 'T00:00:00');
    return `${dt.getMonth()+1}.${dt.getDate()}`;
  }
  function isPast(item){
    const d = item && item.endDate ? item.endDate : (item && item.date);
    if(!d) return false;
    const today = new Date(); today.setHours(0,0,0,0);
    return new Date(d + 'T00:00:00') < today;
  }
  function itemCoversDate(item, dateStr){
    const end = item.endDate || item.date;
    return dateStr >= item.date && dateStr <= end;
  }
  function formatTimeKR(t){
    if(!t) return '';
    const [h,m] = t.split(':').map(Number);
    const period = h < 12 ? '오전' : '오후';
    let h12 = h % 12; if(h12 === 0) h12 = 12;
    return `${period} ${h12}:${String(m).padStart(2,'0')}`;
  }
  function formatScheduleRange(item){
    const startLabel = fmtShortDate(item.date) + (item.time ? ` ${formatTimeKR(item.time)}` : '');
    if(item.endDate && item.endDate !== item.date){
      const endLabel = fmtShortDate(item.endDate) + (item.endTime ? ` ${formatTimeKR(item.endTime)}` : '');
      return `${startLabel} ~ ${endLabel}`;
    }
    if(item.endTime && item.endTime !== item.time){
      return `${startLabel} ~ ${formatTimeKR(item.endTime)}`;
    }
    return startLabel;
  }
  function formatDateTimeKR(ts){
    const dt = new Date(ts);
    const y = dt.getFullYear(), m = String(dt.getMonth()+1).padStart(2,'0'), d = String(dt.getDate()).padStart(2,'0');
    let h = dt.getHours(); const mm = String(dt.getMinutes()).padStart(2,'0');
    const period = h < 12 ? '오전' : '오후'; let h12 = h % 12; if(h12 === 0) h12 = 12;
    return `${y}.${m}.${d} ${period} ${h12}:${mm}`;
  }

    return '';
  }
  function escapeHTML(s){
    return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function linkHost(url){
    try{ return new URL(url).hostname.replace('www.',''); }catch(e){ return url; }

  // ---- 연/월별 그룹 정리 (데이트기록/편지/스탬프 공용) ----
  function renderGroupedByTime(containerId, items, getTs, cardRenderer, expandedSet, emptyHTML){
    const container = document.getElementById(containerId);
    if(items.length === 0){
      container.innerHTML = emptyHTML;
      return;
    }
    const now = new Date();
    const curYear = now.getFullYear(), curMonth = now.getMonth();
    const currentMonthItems = [];
    const monthGroups = {};
    const yearGroups = {};

    items.forEach(item=>{
      const d = new Date(getTs(item));
      const y = d.getFullYear(), m = d.getMonth();
      if(y === curYear){
        if(m === curMonth) currentMonthItems.push(item);
        else { (monthGroups[m] = monthGroups[m] || []).push(item); }
      } else {
        (yearGroups[y] = yearGroups[y] || []).push(item);
      }
    });

    let html = currentMonthItems.map(cardRenderer).join('');

    Object.keys(monthGroups).map(Number).sort((a,b)=>b-a).forEach(m=>{
      const key = `month-${m}`;
      const isOpen = expandedSet.has(key);
      html += `<button class="group-toggle" data-group-key="${key}" data-container="${containerId}">${m+1}월 <span class="group-count">${monthGroups[m].length}개</span> ${isOpen?'▲':'▼'}</button>`;
      html += `<div class="group-content ${isOpen?'':'hidden'}" data-group-content="${key}">${monthGroups[m].map(cardRenderer).join('')}</div>`;
    });

    Object.keys(yearGroups).map(Number).sort((a,b)=>b-a).forEach(y=>{
      const key = `year-${y}`;
      const isOpen = expandedSet.has(key);
      html += `<button class="group-toggle" data-group-key="${key}" data-container="${containerId}">${y}년 <span class="group-count">${yearGroups[y].length}개</span> ${isOpen?'▲':'▼'}</button>`;
      html += `<div class="group-content ${isOpen?'':'hidden'}" data-group-content="${key}">${yearGroups[y].map(cardRenderer).join('')}</div>`;
    });

    container.innerHTML = html;

    container.querySelectorAll('[data-group-key]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const key = btn.dataset.groupKey;
        const content = container.querySelector(`[data-group-content="${key}"]`);
        const isOpen = expandedSet.has(key);
        if(isOpen){ expandedSet.delete(key); content.classList.add('hidden'); }
        else { expandedSet.add(key); content.classList.remove('hidden'); }
        btn.innerHTML = btn.innerHTML.replace(isOpen ? '▲' : '▼', isOpen ? '▼' : '▲');
      });
    });
  }

  // ---- 사진 확대뷰 (핀치줌 / 팬 / 스와이프 넘기기 / 더블탭) ----
  (function(){
    const lightbox = document.getElementById('photoLightbox');
    const stage = document.getElementById('lightboxStage');
    const img = document.getElementById('lightboxImg');
    const closeBtn = document.getElementById('lightboxClose');
    const prevBtn = document.getElementById('lightboxPrev');
    const nextBtn = document.getElementById('lightboxNext');
    const counter = document.getElementById('lightboxCounter');

    let scale = 1, panX = 0, panY = 0;
    let startScale = 1, startDist = 0;
    let startTouchX = 0, startTouchY = 0;
    let isPanning = false, isPinching = false;
    let lastTapTime = 0;
    let swipeStartX = 0, swipeStartY = 0, swipeActive = false;

    let currentPhotos = [];
    let currentIndex = 0;

    function applyTransform(){
      img.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
    }
    function resetTransform(){
      scale = 1; panX = 0; panY = 0; applyTransform();
    }
    function updateNav(){
      const multi = currentPhotos.length > 1;
      prevBtn.classList.toggle('hidden', !multi || currentIndex === 0);
      nextBtn.classList.toggle('hidden', !multi || currentIndex === currentPhotos.length - 1);
      counter.classList.toggle('hidden', !multi);
      if(multi) counter.textContent = `${currentIndex + 1} / ${currentPhotos.length}`;
    }
    function showCurrentPhoto(){
      img.src = currentPhotos[currentIndex];
      resetTransform();
      updateNav();
    }
    function goNext(){
      if(currentIndex < currentPhotos.length - 1){ currentIndex++; showCurrentPhoto(); }
    }
    function goPrev(){
      if(currentIndex > 0){ currentIndex--; showCurrentPhoto(); }
    }
    function openLightbox(photos, index){
      currentPhotos = photos;
      currentIndex = index;
      showCurrentPhoto();
      lightbox.classList.remove('hidden');
    }
    function closeLightbox(){
      lightbox.classList.add('hidden');
      img.src = '';
    }
    closeBtn.addEventListener('click', closeLightbox);
    prevBtn.addEventListener('click', goPrev);
    nextBtn.addEventListener('click', goNext);
    stage.addEventListener('click', (e)=>{
      if(e.target === stage) closeLightbox();
    });

    function touchDist(touches){
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.sqrt(dx*dx + dy*dy);
    }

    stage.addEventListener('touchstart', (e)=>{
      if(e.touches.length === 2){
        isPinching = true; isPanning = false; swipeActive = false;
        startDist = touchDist(e.touches);
        startScale = scale;
      } else if(e.touches.length === 1){
        const now = Date.now();
        if(now - lastTapTime < 300){
          if(scale > 1){ resetTransform(); } else { scale = 2.5; applyTransform(); }
          lastTapTime = 0;
          swipeActive = false;
          return;
        }
        lastTapTime = now;
        isPinching = false;
        if(scale > 1){
          isPanning = true; swipeActive = false;
          startTouchX = e.touches[0].clientX - panX;
          startTouchY = e.touches[0].clientY - panY;
        } else {
          isPanning = false; swipeActive = true;
          swipeStartX = e.touches[0].clientX;
          swipeStartY = e.touches[0].clientY;
        }
      }
    }, {passive:true});

    stage.addEventListener('touchmove', (e)=>{
      if(isPinching && e.touches.length === 2){
        e.preventDefault();
        const newDist = touchDist(e.touches);
        scale = Math.min(4, Math.max(1, startScale * (newDist / startDist)));
        applyTransform();
      } else if(isPanning && e.touches.length === 1){
        e.preventDefault();
        panX = e.touches[0].clientX - startTouchX;
        panY = e.touches[0].clientY - startTouchY;
        applyTransform();
      } else if(swipeActive && e.touches.length === 1){
        e.preventDefault();
      }
    }, {passive:false});

    stage.addEventListener('touchend', (e)=>{
      if(e.touches.length === 0){
        if(isPanning){
          isPanning = false;
          if(scale <= 1) resetTransform();
        } else if(isPinching){
          isPinching = false;
          if(scale <= 1) resetTransform();
        } else if(swipeActive){
          const t = e.changedTouches[0];
          const dx = t.clientX - swipeStartX;
          const dy = t.clientY - swipeStartY;
          if(Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)){
            if(dx < 0) goNext(); else goPrev();
          }
        }
        swipeActive = false;
      }
    });

    document.addEventListener('click', (e)=>{
      const target = e.target.closest('.card-photos img');
      if(target){
        const container = target.closest('.card-photos');
        const imgs = Array.from(container.querySelectorAll('img'));
        openLightbox(imgs.map(i=>i.src), imgs.indexOf(target));
      }
    });
  })();

  function renderCalendar(){

  function formatTodayKR(){
    const days = ['일','월','화','수','목','금','토'];
    const d = new Date();
    return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${days[d.getDay()]}요일`;
  }
  function nextAnniversary(){
    const anniv = new Date(ANNIV + 'T00:00:00');
    const today = new Date(); today.setHours(0,0,0,0);
    let n = 1;
    let candidate = new Date(anniv.getFullYear()+n, anniv.getMonth(), anniv.getDate());
    while(candidate < today){
      n++;
      candidate = new Date(anniv.getFullYear()+n, anniv.getMonth(), anniv.getDate());
    }
    const diffDays = Math.round((candidate - today) / 86400000);
    return { n, diffDays };
  }

  function findThrowback(){
    const today = new Date();
    const mm = today.getMonth(), dd = today.getDate(), curYear = today.getFullYear();
    const candidates = [];
    dateLogs.forEach(item=>{
      if(!item.date) return;
      const d = new Date(item.date + 'T00:00:00');
      if(d.getMonth() === mm && d.getDate() === dd && d.getFullYear() < curYear){
        candidates.push({ type:'datelog', yearsAgo: curYear - d.getFullYear(), item });
      }
    });
    letters.forEach(item=>{
      const d = new Date(item.createdAt || 0);
      if(d.getMonth() === mm && d.getDate() === dd && d.getFullYear() < curYear && d.getFullYear() > 2000){
        candidates.push({ type:'letter', yearsAgo: curYear - d.getFullYear(), item });
      }
    });
    if(candidates.length === 0) return null;
    candidates.sort((a,b)=> a.yearsAgo - b.yearsAgo);
    return candidates[0];
  }

  function watch(collectionName, orderField, orderDir, onData){
    db.collection(collectionName).orderBy(orderField, orderDir).onSnapshot(snap=>{
      const items = [];
      snap.forEach(doc=> items.push({ id: doc.id, ...doc.data() }));
      onData(items);
    }, err=>{ console.error(collectionName+' 구독 오류', err); });
  }

    document.getElementById('loginGateMsg').innerHTML = message;

  let pushToastTimer = null;
  let pushToastTab = null;
  function showPushToast(title, tab){
    pushToastTab = tab || null;
    document.getElementById('pushToastTitle').textContent = title || '';
    document.getElementById('pushToastBody').textContent = '';
    const toast = document.getElementById('pushToast');
    toast.classList.remove('hidden');
    clearTimeout(pushToastTimer);
    pushToastTimer = setTimeout(()=>{ toast.classList.add('hidden'); }, 5000);
  }
  document.getElementById('pushToast').addEventListener('click', ()=>{

  });

  async function setupPushNotifications(){
    try{
      if(!('serviceWorker' in navigator) || !('Notification' in window)) return;
      const registration = await navigator.serviceWorker.register('firebase-messaging-sw.js');
      const permission = await Notification.requestPermission();
      if(permission !== 'granted') return;
      const messaging = firebase.messaging();
      const token = await messaging.getToken({ vapidKey: VAPID_KEY, serviceWorkerRegistration: registration });
      if(token){
        await db.collection('fcmTokens').doc(identity).set({ token, updatedAt: Date.now() });
      }
      messaging.onMessage((payload)=>{
        showPushToast(
          payload.notification && payload.notification.title,
          payload.data && payload.data.tab
        );
      });
    }catch(e){
      console.error('푸시 알림 설정 실패', e);
    }
  }
  function maybeShowNotifPrompt(){
    if('Notification' in window && Notification.permission === 'default'){
      document.getElementById('notifPrompt').classList.remove('hidden');
    }
  }
