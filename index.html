<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>벅구와 복덩어리</title>
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="favicon-32.png" sizes="32x32">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="벅구와 복덩어리">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

  :root{
    --cream:#FFF6EC;
    --pink:#FF8FA8;
    --pink-soft:#FFE3EA;
    --yellow:#FFC94C;
    --yellow-soft:#FFF3D6;
    --plum:#4A3548;
    --plum-soft:#8A7A86;
    --sage:#8FBF9F;
    --white:#FFFFFF;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    background:var(--cream);
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
    color:var(--plum);
  }

  .app-shell{
    max-width:430px;
    margin:0 auto;
    min-height:100vh;
    background:var(--cream);
    position:relative;
    padding-bottom:88px;
  }

  .app-header{
    position:sticky;
    top:0;
    z-index:20;
    background:var(--cream);
    padding:18px 20px 12px;
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
    border-bottom:1px solid rgba(74,53,72,0.08);
  }
  .app-title{
    font-family:'Jua',sans-serif;
    font-size:19px;
    letter-spacing:-0.3px;
    line-height:1.3;
  }
  .dday-pill{
    display:inline-flex;
    align-items:center;
    gap:5px;
    margin-top:6px;
    background:var(--white);
    border-radius:20px;
    padding:5px 12px;
    font-size:11px;
    color:var(--plum-soft);
    box-shadow:0 2px 8px rgba(74,53,72,0.06);
  }
  .dday-pill b{
    font-family:'Jua',sans-serif;
    color:var(--pink);
    font-size:12px;
  }
  .identity-chip{
    font-family:'Jua',sans-serif;
    font-size:13px;
    background:var(--white);
    border:none;
    padding:8px 14px;
    border-radius:20px;
    box-shadow:0 2px 8px rgba(74,53,72,0.08);
    cursor:pointer;
    color:var(--plum);
    white-space:nowrap;
    flex-shrink:0;
  }

  main{padding:16px 20px 20px;}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;animation:fadeIn .25s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  .section-title{
    font-family:'Jua',sans-serif;
    font-size:18px;
    margin:4px 0 14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .section-sub{
    font-size:12px;
    font-weight:400;
    color:var(--plum-soft);
    font-family:'Pretendard',sans-serif;
  }

  .add-card{
    background:var(--white);
    border-radius:18px;
    padding:16px;
    margin-bottom:18px;
    box-shadow:0 4px 14px rgba(74,53,72,0.06);
  }
  .add-row{display:flex;gap:8px;margin-bottom:8px;}
  .add-row:last-child{margin-bottom:0;}
  input[type="text"], input[type="date"], input[type="url"], textarea{
    width:100%;
    border:1.5px solid #F0E4E9;
    background:#FDFBF9;
    border-radius:12px;
    padding:10px 12px;
    font-size:14px;
    font-family:'Pretendard',sans-serif;
    color:var(--plum);
    outline:none;
  }
  input[type="text"]:focus, input[type="date"]:focus, input[type="url"]:focus, textarea:focus{
    border-color:var(--pink);
  }
  textarea{resize:none;min-height:56px;}
  .btn{
    font-family:'Jua',sans-serif;
    border:none;
    border-radius:12px;
    padding:10px 16px;
    font-size:14px;
    cursor:pointer;
    color:var(--white);
    background:var(--pink);
    white-space:nowrap;
  }
  .btn:active{transform:scale(0.96);}
  .btn-yellow{background:var(--yellow);color:var(--plum);}
  .btn:disabled{opacity:0.55;cursor:default;}

  .btn-photo{
    background:#FDFBF9;border:1.5px dashed #E7D4DB;border-radius:12px;
    padding:9px 12px;font-size:12.5px;color:var(--plum-soft);cursor:pointer;
    font-family:'Pretendard',sans-serif;width:100%;
  }
  .photo-preview-wrap{position:relative;margin-top:8px;}
  .photo-preview{width:100%;max-height:160px;object-fit:cover;border-radius:12px;display:block;}
  .photo-preview-wrap .rm-photo{
    position:absolute;top:6px;right:6px;background:rgba(255,255,255,0.9);border:none;
    border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;
    font-size:12px;cursor:pointer;color:var(--plum);
  }
  .item-photo{
    width:100%;max-height:150px;object-fit:cover;border-radius:12px;margin-top:8px;display:block;
    background:#F5EBEE;
  }

  .list{display:flex;flex-direction:column;gap:10px;}
  .item-card{
    background:var(--white);
    border-radius:16px;
    padding:14px;
    display:flex;
    align-items:flex-start;
    gap:12px;
    box-shadow:0 3px 10px rgba(74,53,72,0.05);
  }
  .date-badge{
    flex-shrink:0;
    width:44px;
    text-align:center;
    background:var(--pink-soft);
    border-radius:10px;
    padding:6px 0;
    font-family:'Jua',sans-serif;
  }
  .date-badge .day{font-size:16px;line-height:1;}
  .date-badge .mon{font-size:10px;color:var(--plum-soft);}
  .item-body{flex:1;min-width:0;}
  .item-title{font-size:14px;font-weight:600;word-break:break-word;}
  .item-memo{font-size:12px;color:var(--plum-soft);margin-top:3px;word-break:break-word;white-space:pre-wrap;}
  .item-meta{display:flex;align-items:center;gap:6px;margin-top:6px;}
  .author-tag{
    font-size:10px;
    padding:2px 8px;
    border-radius:8px;
    font-family:'Jua',sans-serif;
  }
  .author-sojeong{background:var(--pink-soft);color:#C24065;}
  .author-seonho{background:var(--yellow-soft);color:#8A6600;}
  .del-btn{
    border:none;background:none;color:#D8C7CE;font-size:16px;cursor:pointer;padding:2px 4px;flex-shrink:0;
  }
  .edit-btn{
    border:none;background:none;color:var(--plum-soft);font-size:15px;cursor:pointer;padding:2px 6px;flex-shrink:0;
  }
  .cancel-edit-btn{
    display:block;width:100%;text-align:center;background:none;border:none;
    color:var(--plum-soft);font-size:12px;padding:10px 0 0;cursor:pointer;text-decoration:underline;
  }
  .toggle-past-btn{
    display:block;margin:14px auto 0;background:var(--white);border:none;border-radius:20px;
    padding:8px 16px;font-size:12px;color:var(--plum-soft);box-shadow:0 2px 8px rgba(74,53,72,0.06);cursor:pointer;
  }
  .past{opacity:0.5;}

  .empty-state{
    text-align:center;
    padding:40px 10px;
    color:var(--plum-soft);
    font-size:13px;
  }
  .empty-emoji{font-size:32px;display:block;margin-bottom:10px;}

  .wish-card{
    background:var(--white);border-radius:18px;overflow:hidden;
    box-shadow:0 4px 14px rgba(74,53,72,0.06);margin-bottom:14px;
  }
  .wish-photo{width:100%;height:170px;object-fit:cover;display:block;background:#F5EBEE;}
  .wish-content{padding:16px;}
  .wish-title{font-size:15px;font-weight:700;margin-bottom:6px;}
  .wish-body{font-size:13px;color:var(--plum-soft);white-space:pre-wrap;word-break:break-word;line-height:1.5;}
  .wish-link{
    display:inline-flex;align-items:center;gap:4px;margin-top:10px;font-size:12px;
    background:var(--pink-soft);color:#C24065;padding:6px 10px;border-radius:10px;text-decoration:none;
    word-break:break-all;
  }
  .wish-footer{
    display:flex;align-items:center;justify-content:space-between;margin-top:12px;
    padding-top:10px;border-top:1px solid #F5EBEE;
  }
  .wish-meta{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--plum-soft);}

  .stat-row{display:flex;gap:10px;margin-bottom:16px;}
  .stat-card{
    flex:1;background:var(--white);border-radius:16px;padding:14px;text-align:center;
    box-shadow:0 3px 10px rgba(74,53,72,0.05);
  }
  .stat-num{font-family:'Jua',sans-serif;font-size:22px;}
  .stat-label{font-size:11px;color:var(--plum-soft);margin-top:2px;}
  .person-toggle{display:flex;gap:8px;margin-bottom:10px;}
  .person-btn{
    flex:1;padding:10px;border-radius:12px;border:1.5px solid #F0E4E9;background:#FDFBF9;
    font-family:'Jua',sans-serif;font-size:13px;cursor:pointer;color:var(--plum-soft);
  }
  .person-btn.selected-sojeong{background:var(--pink);color:var(--white);border-color:var(--pink);}
  .person-btn.selected-seonho{background:var(--yellow);color:var(--plum);border-color:var(--yellow);}

  .stamp-list{display:flex;flex-direction:column;gap:12px;}
  .stamp-card{
    background:var(--white);border-radius:16px;padding:14px;display:flex;gap:12px;align-items:flex-start;
    box-shadow:0 3px 10px rgba(74,53,72,0.05);
  }
  .stamp-badge{
    flex-shrink:0;width:56px;height:56px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;position:relative;
    transform:rotate(-8deg);font-family:'Jua',sans-serif;font-size:9px;text-align:center;line-height:1.15;
  }
  .stamp-badge::before{
    content:'';position:absolute;inset:0;border-radius:50%;border:2.5px dashed currentColor;
  }
  .stamp-badge.p-sojeong{color:#C24065;}
  .stamp-badge.p-seonho{color:#8A6600;}
  .stamp-pop{animation:stampPop .45s cubic-bezier(.34,1.56,.64,1);}
  @keyframes stampPop{0%{transform:scale(0) rotate(-30deg);opacity:0;}70%{transform:scale(1.15) rotate(-8deg);opacity:1;}100%{transform:scale(1) rotate(-8deg);}}
  .stamp-body{flex:1;min-width:0;}
  .stamp-text{font-size:13.5px;word-break:break-word;}
  .stamp-date{font-size:11px;color:var(--plum-soft);margin-top:3px;}

  .tabbar{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:430px;
    background:var(--white);
    display:flex;
    box-shadow:0 -4px 16px rgba(74,53,72,0.08);
    border-radius:22px 22px 0 0;
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));
    z-index:30;
  }
  .tab-btn{
    flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:6px 0;cursor:pointer;color:#C9BAC2;font-family:'Pretendard',sans-serif;font-size:10px;
  }
  .tab-btn.active{color:var(--pink);}
  .tab-btn svg{width:22px;height:22px;}

  .modal-overlay{
    position:fixed;inset:0;background:rgba(74,53,72,0.45);z-index:100;
    display:flex;align-items:center;justify-content:center;padding:24px;
    visibility:visible;
  }
  .modal-card{
    background:var(--white);border-radius:22px;padding:28px 24px;max-width:340px;width:100%;text-align:center;
  }
  .modal-title{font-family:'Jua',sans-serif;font-size:18px;margin-bottom:6px;}
  .modal-sub{font-size:12px;color:var(--plum-soft);margin-bottom:20px;}
  .modal-btns{display:flex;gap:10px;}
  .modal-btns .btn{flex:1;font-size:15px;padding:14px 0;}
  .hidden{display:none !important;}
  .sync-dot{
    position:fixed;top:10px;right:12px;z-index:110;font-size:10px;color:var(--plum-soft);
    background:var(--white);padding:4px 10px;border-radius:10px;box-shadow:0 2px 6px rgba(74,53,72,0.08);
  }

  /* ---------- Desktop layout ---------- */
  @media (min-width: 700px){
    .app-shell{
      max-width: 720px;
      padding-bottom: 40px;
    }
    main{
      padding-bottom: 10px;
    }
    .tabbar{
      position: static;
      left: auto;
      transform: none;
      max-width: none;
      width: 100%;
      border-radius: 18px;
      box-shadow: 0 4px 14px rgba(74,53,72,0.08);
      margin: 24px 0 0;
    }
    .tab-btn{
      font-size: 12px;
      cursor: pointer;
    }
    .add-card, .item-card, .wish-card, .stamp-card, .stat-card, .modal-card{
      cursor: default;
    }
  }
</style>
</head>
<body>

<div class="app-shell">
  <header class="app-header">
    <div>
      <div class="app-title">🐶벅구와 복덩어리💝</div>
      <div class="dday-pill" id="ddayPill"></div>
    </div>
    <button class="identity-chip" id="identityChip" title="탭하면 로그아웃">나는 ...</button>
  </header>

  <main>
    <section class="tab-panel active" id="panel-schedule">
      <div class="section-title">일정 공유</div>
      <div class="add-card">
        <div class="add-row">
          <input type="date" id="schedDate" style="max-width:150px;">
          <input type="text" id="schedTitle" placeholder="무슨 일정이야?">
        </div>
        <div class="add-row">
          <textarea id="schedMemo" placeholder="메모 (선택)"></textarea>
        </div>
        <div class="add-row">
          <button class="btn" id="schedAddBtn" style="width:100%;">추가하기</button>
        </div>
        <button class="cancel-edit-btn hidden" id="schedCancelBtn">수정 취소</button>
      </div>
      <div class="list" id="scheduleList"></div>
      <button class="toggle-past-btn hidden" id="togglePastBtn">지난 일정 보기</button>
      <div class="list hidden" id="pastScheduleSection" style="margin-top:10px;"></div>
    </section>

    <section class="tab-panel" id="panel-wish">
      <div class="section-title">하고 싶은 일</div>
      <div class="add-card">
        <div class="add-row">
          <input type="text" id="wishTitle" placeholder="제목">
        </div>
        <div class="add-row">
          <textarea id="wishBody" placeholder="어떤 걸 해보고 싶어? 자유롭게 적어봐" style="min-height:80px;"></textarea>
        </div>
        <div class="add-row">
          <input type="url" id="wishLink" placeholder="링크 (선택)">
        </div>
        <div class="add-row">
          <input type="file" accept="image/*" id="wishPhotoInput" class="hidden">
          <button class="btn-photo" id="wishPhotoBtn">📷 사진 추가 (선택)</button>
        </div>
        <div class="photo-preview-wrap hidden" id="wishPhotoPreviewWrap">
          <img class="photo-preview" id="wishPhotoPreview">
          <button class="rm-photo" id="wishPhotoRemove">✕</button>
        </div>
        <div class="add-row">
          <button class="btn" id="wishAddBtn" style="width:100%;">게시하기</button>
        </div>
        <button class="cancel-edit-btn hidden" id="wishCancelBtn">수정 취소</button>
      </div>
      <div id="wishList"></div>
    </section>

    <section class="tab-panel" id="panel-datelog">
      <div class="section-title">데이트 기록</div>
      <div class="add-card">
        <div class="add-row">
          <input type="date" id="dateLogDate" style="max-width:150px;">
          <input type="text" id="dateLogTitle" placeholder="장소 / 제목">
        </div>
        <div class="add-row">
          <textarea id="dateLogMemo" placeholder="오늘 어땠어?"></textarea>
        </div>
        <div class="add-row">
          <input type="file" accept="image/*" id="dateLogPhotoInput" class="hidden">
          <button class="btn-photo" id="dateLogPhotoBtn">📷 사진 추가 (선택)</button>
        </div>
        <div class="photo-preview-wrap hidden" id="dateLogPhotoPreviewWrap">
          <img class="photo-preview" id="dateLogPhotoPreview">
          <button class="rm-photo" id="dateLogPhotoRemove">✕</button>
        </div>
        <div class="add-row">
          <button class="btn" id="dateLogAddBtn" style="width:100%;">기록하기</button>
        </div>
        <button class="cancel-edit-btn hidden" id="dateLogCancelBtn">수정 취소</button>
      </div>
      <div class="list" id="dateLogList"></div>
    </section>

    <section class="tab-panel" id="panel-letter">
      <div class="section-title">편지</div>
      <div class="add-card">
        <div class="add-row">
          <input type="text" id="letterTitle" placeholder="제목 (선택)">
        </div>
        <div class="add-row">
          <textarea id="letterBody" placeholder="하고 싶은 말을 편지처럼 적어봐" style="min-height:120px;"></textarea>
        </div>
        <div class="add-row">
          <input type="file" accept="image/*" id="letterPhotoInput" class="hidden">
          <button class="btn-photo" id="letterPhotoBtn">📷 사진 추가 (선택)</button>
        </div>
        <div class="photo-preview-wrap hidden" id="letterPhotoPreviewWrap">
          <img class="photo-preview" id="letterPhotoPreview">
          <button class="rm-photo" id="letterPhotoRemove">✕</button>
        </div>
        <div class="add-row">
          <button class="btn" id="letterAddBtn" style="width:100%;">편지 보내기</button>
        </div>
        <button class="cancel-edit-btn hidden" id="letterCancelBtn">수정 취소</button>
      </div>
      <div id="letterList"></div>
    </section>

    <section class="tab-panel" id="panel-stamp">
      <div class="section-title">참 잘했어요 스탬프</div>
      <div class="stat-row">
        <div class="stat-card">
          <div class="stat-num" id="statSojeong" style="color:var(--pink);">0</div>
          <div class="stat-label">소정 스탬프</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="statSeonho" style="color:var(--yellow);">0</div>
          <div class="stat-label">선호 스탬프</div>
        </div>
      </div>
      <div class="add-card">
        <div class="section-sub" style="margin-bottom:8px;">누가 잘했나요?</div>
        <div class="person-toggle">
          <button class="person-btn" id="pickSojeong">소정이 잘함 🌷</button>
          <button class="person-btn" id="pickSeonho">선호가 잘함 🌻</button>
        </div>
        <div class="add-row">
          <textarea id="stampText" placeholder="어떤 점이 좋았어?"></textarea>
        </div>
        <div class="add-row">
          <input type="file" accept="image/*" id="stampPhotoInput" class="hidden">
          <button class="btn-photo" id="stampPhotoBtn">📷 사진 추가 (선택)</button>
        </div>
        <div class="photo-preview-wrap hidden" id="stampPhotoPreviewWrap">
          <img class="photo-preview" id="stampPhotoPreview">
          <button class="rm-photo" id="stampPhotoRemove">✕</button>
        </div>
        <div class="add-row">
          <button class="btn btn-yellow" id="stampAddBtn" style="width:100%;">도장 쾅! 찍기</button>
        </div>
        <button class="cancel-edit-btn hidden" id="stampCancelBtn">수정 취소</button>
      </div>
      <div class="stamp-list" id="stampList"></div>
    </section>
  </main>

  <nav class="tabbar">
    <button class="tab-btn active" data-tab="schedule">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
      일정
    </button>
    <button class="tab-btn" data-tab="wish">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2l2.4 6.8L21 9.3l-5.4 4.6L17.3 21 12 17.2 6.7 21l1.7-7.1L3 9.3l6.6-0.5z"/></svg>
      위시
    </button>
    <button class="tab-btn" data-tab="datelog">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 20s-7-4.5-9.5-9C1 7.5 2.5 4 6 4c2 0 3.5 1.2 4.5 2.8C11.5 5.2 13 4 15 4c3.5 0 5 3.5 3.5 7-2.5 4.5-9.5 9-9.5 9z"/></svg>
      데이트
    </button>
    <button class="tab-btn" data-tab="letter">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
      편지
    </button>
    <button class="tab-btn" data-tab="stamp">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="9" r="6"/><path d="M8.5 14.5L7 21l5-3 5 3-1.5-6.5"/></svg>
      스탬프
    </button>
  </nav>

  <div class="modal-overlay hidden" id="confirmModal">
    <div class="modal-card">
      <div class="modal-title">삭제할까?</div>

  function resizeImage(file){
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onload = (e)=>{
        const img = new Image();
        img.onload = ()=>{
          let w = img.width, h = img.height;
          const maxDim = 1000;
          if(w > maxDim || h > maxDim){
            if(w > h){ h = Math.round(h * maxDim / w); w = maxDim; }
            else { w = Math.round(w * maxDim / h); h = maxDim; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', 0.65));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function setupPhotoPicker(inputId, btnId, wrapId, previewId, removeId, onChange){

      try{

        document.getElementById(previewId).src = dataUrl;
        document.getElementById(wrapId).classList.remove('hidden');
      }catch(e){ console.error('사진 처리 실패', e); }

    document.getElementById(removeId).addEventListener('click', ()=>{

    document.getElementById('stampText').value = item.text;

    if(item.photo){
      document.getElementById('stampPhotoPreview').src = item.photo;
      document.getElementById('stampPhotoPreviewWrap').classList.remove('hidden');
    } else {
      document.getElementById('stampPhotoPreviewWrap').classList.add('hidden');
    }
    renderStamp();
    document.getElementById('stampAddBtn').textContent = '수정 완료';
    document.getElementById('stampCancelBtn').classList.remove('hidden');
    document.getElementById('stampAddBtn').closest('.add-card').scrollIntoView({behavior:'smooth', block:'start'});
  }
  function resetStampForm(){
    editingStampId = null;
    document.getElementById('stampText').value='';
    pendingStampPhoto = null;
    document.getElementById('stampPhotoPreviewWrap').classList.add('hidden');
    document.getElementById('stampAddBtn').textContent = '도장 쾅! 찍기';
    document.getElementById('stampCancelBtn').classList.add('hidden');
    stampPerson = null;
    renderStamp();
  }
  document.getElementById('stampCancelBtn').addEventListener('click', resetStampForm);
  document.getElementById('stampAddBtn').addEventListener('click', async ()=>{
    const text = document.getElementById('stampText').value.trim();
    if(!text || !stampPerson) return;
    try{
      if(editingStampId){
        await db.collection('stamps').doc(editingStampId).update({ person: stampPerson, text, photo: pendingStampPhoto || null });
        resetStampForm();
      } else {
        const id = genId();
        await db.collection('stamps').doc(id).set({
          person: stampPerson, text, photo: pendingStampPhoto || null, createdAt: Date.now()
        });
        document.getElementById('stampText').value='';
        pendingStampPhoto = null;
        document.getElementById('stampPhotoPreviewWrap').classList.add('hidden');
        renderStamp(id);
      }
    }catch(e){ console.error('스탬프 저장 실패', e); alert('저장에 실패했어. 사진이 너무 크면 실패할 수 있어.'); }
  });
  document.getElementById('stampList').addEventListener('click', (e)=>{
    const editId = e.target.dataset && e.target.dataset.editStamp;
    const delId = e.target.dataset && e.target.dataset.delStamp;
    if(editId){
      const item = stamps.find(s=>s.id===editId);
      if(item) startEditStamp(item);
    } else if(delId){
      askDeleteConfirm(async ()=>{ await db.collection('stamps').doc(delId).delete(); });
    }
  });

  // ---- 편지 ----
  let editingLetterId = null;
  setupPhotoPicker('letterPhotoInput','letterPhotoBtn','letterPhotoPreviewWrap','letterPhotoPreview','letterPhotoRemove', (v)=>{ pendingLetterPhoto = v; });
  function startEditLetter(item){
    editingLetterId = item.id;
    document.getElementById('letterTitle').value = item.title || '';
    document.getElementById('letterBody').value = item.body || '';
    pendingLetterPhoto = item.photo || null;
    if(item.photo){
      document.getElementById('letterPhotoPreview').src = item.photo;
      document.getElementById('letterPhotoPreviewWrap').classList.remove('hidden');
    } else {
      document.getElementById('letterPhotoPreviewWrap').classList.add('hidden');
    }
    document.getElementById('letterAddBtn').textContent = '수정 완료';
    document.getElementById('letterCancelBtn').classList.remove('hidden');
    document.getElementById('letterAddBtn').closest('.add-card').scrollIntoView({behavior:'smooth', block:'start'});
  }
  function resetLetterForm(){
    editingLetterId = null;
    document.getElementById('letterTitle').value='';
    document.getElementById('letterBody').value='';
    pendingLetterPhoto = null;
    document.getElementById('letterPhotoPreviewWrap').classList.add('hidden');
    document.getElementById('letterAddBtn').textContent = '편지 보내기';
    document.getElementById('letterCancelBtn').classList.add('hidden');
  }
  document.getElementById('letterCancelBtn').addEventListener('click', resetLetterForm);
  document.getElementById('letterAddBtn').addEventListener('click', async ()=>{
    const body = document.getElementById('letterBody').value.trim();
    if(!body) return;
    const title = document.getElementById('letterTitle').value.trim();
    try{
      if(editingLetterId){
        await db.collection('letters').doc(editingLetterId).update({ title, body, photo: pendingLetterPhoto || null });
        resetLetterForm();
      } else {
        await db.collection('letters').doc(genId()).set({
          title, body, photo: pendingLetterPhoto || null, author: identity, createdAt: Date.now()
        });
        document.getElementById('letterTitle').value='';
        document.getElementById('letterBody').value='';
        pendingLetterPhoto = null;
        document.getElementById('letterPhotoPreviewWrap').classList.add('hidden');
      }
    }catch(e){ console.error('편지 저장 실패', e); alert('저장에 실패했어. 사진이 너무 크면 실패할 수 있어.'); }
  });
  document.getElementById('letterList').addEventListener('click', (e)=>{
    const editId = e.target.dataset && e.target.dataset.editLetter;
    const delId = e.target.dataset && e.target.dataset.delLetter;
    if(editId){
      const item = letters.find(s=>s.id===editId);
      if(item) startEditLetter(item);
    } else if(delId){
      askDeleteConfirm(async ()=>{ await db.collection('letters').doc(delId).delete(); });
    }
  });

  function watch(collectionName, orderField, orderDir, onData){
    db.collection(collectionName).orderBy(orderField, orderDir).onSnapshot(snap=>{
      const items = [];
      snap.forEach(doc=> items.push({ id: doc.id, ...doc.data() }));
      onData(items);
    }, err=>{ console.error(collectionName+' 구독 오류', err); });
  }

  const EMAIL_MAP = {
    'sjsj980415@gmail.com': '소정',
    'kkang59405@gmail.com': '선호'
  };
  let watchersStarted = false;

  function showGate(message){
    document.getElementById('loginGateMsg').innerHTML = message;
    document.getElementById('loginGate').classList.remove('hidden');
    document.querySelector('.app-shell').style.visibility = 'hidden';
  }
  function hideGate(){
    document.getElementById('loginGate').classList.add('hidden');
    document.querySelector('.app-shell').style.visibility = 'visible';
  }

  function startWatchers(){
    if(watchersStarted) return;
    watchersStarted = true;
    watch('schedule', 'date', 'asc', items=>{ schedule = items; renderSchedule(); });
    watch('wishlist', 'createdAt', 'desc', items=>{ wishes = items; renderWish(); });
    watch('datelog', 'date', 'desc', items=>{ dateLogs = items; renderDateLog(); });
    watch('stamps', 'createdAt', 'desc', items=>{ stamps = items; renderStamp(); });
    watch('letters', 'createdAt', 'desc', items=>{ letters = items; renderLetters(); });
  }

  function init(){
    renderDday();
    const today = new Date();
    document.getElementById('schedDate').value = today.toISOString().slice(0,10);
    document.getElementById('dateLogDate').value = today.toISOString().slice(0,10);
    document.querySelector('.app-shell').style.visibility = 'hidden';

    firebase.auth().onAuthStateChanged(user=>{
      if(user && EMAIL_MAP[user.email]){
        identity = EMAIL_MAP[user.email];
        updateIdentityChip();
        hideGate();
        startWatchers();
      } else if(user && !EMAIL_MAP[user.email]){
        firebase.auth().signOut();
        showGate('이 구글 계정은 사용할 수 없어요.<br>소정, 선호 계정으로만 로그인해줘.');
      } else {
        showGate('소정, 선호만 쓸 수 있는 앱이에요.<br>구글 계정으로 로그인해줘.');
      }
    });
  }
  init();
})();
</script>
